name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-static-analysis:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Run lint FIRST (fail fast)
      - name: Run Laravel Pint (linting)
        run: composer run lint

      # Then static analysis
      - name: Run Larastan (static analysis)
        run: composer run larastan

  backend-tests:
    name: Backend Tests (Pest)
    runs-on: ubuntu-latest
    needs: lint-and-static-analysis  # Only run if lint passes

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nemesis_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          extensions: pdo, pdo_pgsql, mbstring, xml, ctype, json
          coverage: xdebug

      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/composer
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Copy .env
        run: cp .env.example .env.test

      - name: Generate application key
        run: php artisan key:generate --env=test

      - name: Run migrations
        run: php artisan migrate:fresh --env=test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nemesis_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Run Pest (backend tests)
        run: php artisan test --env=test --coverage --coverage-html=coverage/backend
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: nemesis_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage
          path: coverage/backend/

  frontend-tests:
    name: Frontend Tests (Vitest)
    runs-on: ubuntu-latest
    needs: lint-and-static-analysis  # Only run if lint passes

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Run Vitest (frontend tests)
        run: npm run test:ci -- --coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage
          path: coverage/

  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: frontend-tests  # Only build if frontend tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: public/build/
          retention-days: 7

  # Summary job - only runs if all tests pass
  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [lint-and-static-analysis, backend-tests, frontend-tests, build]
    if: success()
    
    steps:
      - name: All checks passed ✅
        run: echo "All CI checks passed successfully!"